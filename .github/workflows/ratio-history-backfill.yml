name: Ratio History Backfill (one-time)

# Reads each LST/amp hub's {state}.exchange_rate at PAST block heights on an
# ARCHIVE node → weekly ratio series for ampCAPA, ampROAR (+ optional LUNA LSTs).
# Commit this + ratio-history-backfill.js to price-history-data_2026, then:
#   1) run mode=survey FIRST — tests candidate archive endpoints (RPC abci_query
#      + LCD header) and prints which one serves historical state. Writes nothing.
#   2) run mode=full with archive_method + archive_endpoint set to the survey
#      WINNER — publishes 2026/data/ratio-history.json.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "survey (find a working archive endpoint, write nothing) | full (build + publish)"
        type: choice
        options: [survey, full]
        default: survey
      archive_method:
        description: "full only: rpc-abci | lcd-header (use the survey WINNER)"
        type: string
        default: ""
      archive_endpoint:
        description: "full only: the archive endpoint URL (use the survey WINNER)"
        type: string
        default: ""
      weeks:
        description: "Weeks of history to attempt (capped by the archive's horizon)"
        type: string
        default: "130"

permissions:
  contents: write

concurrency:
  group: ratio-history-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run ratio history backfill
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_BRANCH: ${{ github.ref_name }}
          RUN_MODE: ${{ inputs.mode }}
          ARCHIVE_METHOD: ${{ inputs.archive_method }}
          ARCHIVE_ENDPOINT: ${{ inputs.archive_endpoint }}
          WEEKS: ${{ inputs.weeks }}
        run: node ratio-history-backfill.js
